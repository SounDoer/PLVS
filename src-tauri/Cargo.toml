[package]
name = "app"
version = "0.0.10"
description = "AudioMeter — real-time audio metering (Tauri desktop shell)"
authors = ["SounDoer"]
license = "MIT"
repository = "https://github.com/SounDoer/AudioMeter"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
cc = "1.2.61"
tauri-build = { version = "2.6.1", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.1", features = [] }
tauri-plugin-log = "2"
tauri-plugin-store = "2.4.3"
cpal = "0.17.3"
realfft = "3.4.0"
rustfft = "6.2.0"
sha2 = "0.11"
