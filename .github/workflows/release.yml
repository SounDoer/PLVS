# Windows 安装包（NSIS）+ 便携主程序；macOS 安装包（DMG，Apple Silicon）。
# - 每次手动运行或打 v* 标签时构建；产物上传为 workflow artifact。
# - 仅在 push 版本标签时附加到 GitHub Release。

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 发布门禁：跑与 CI 一致的前端检查，红灯则不构建任何安装包。
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package / Cargo versions match
        run: npm run version:check

      - name: Format (Prettier)
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend (Vite)
        run: npm run build

  # 发布门禁：跑与 CI 一致的 Rust 检查（rustfmt / clippy / cargo test）。
  verify-rust:
    # ubuntu-24.04 (glibc 2.39) provides the __isoc23_* symbols the prebuilt ONNX Runtime (ort)
    # links against; 22.04 (glibc 2.35) fails to link them.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies (Tauri / WebKit / audio)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Format (rustfmt)
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  build-windows:
    needs: [verify, verify-rust]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Tauri bundle (NSIS + release binary for portable)
        run: npm run desktop:release-nsis

      - name: Upload NSIS bundle as artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/

      - name: Upload portable executable as artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-portable-exe
          path: src-tauri/target/release/plvs.exe

      - name: Stage portable binary for Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $src = "src-tauri/target/release/plvs.exe"
          if (!(Test-Path $src)) { throw "Missing $src" }
          Copy-Item $src "PLVS-${{ github.ref_name }}-x64-portable.exe"

      - name: Prepare release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/changelog-release-body.mjs "${{ github.ref_name }}" release-notes.md

      - name: Attach installers to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            PLVS-${{ github.ref_name }}-x64-portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: [verify, verify-rust]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundle (DMG)
        run: npm run desktop:release-dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/

      - name: Rename DMG for Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          src=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          cp "$src" "PLVS-${{ github.ref_name }}-aarch64.dmg"

      - name: Attach DMG to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: PLVS-${{ github.ref_name }}-aarch64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
