# Windows 安装包（NSIS）+ 便携主程序；macOS 安装包（DMG，Apple Silicon）。
# - 每次手动运行或打 v* 标签时构建；产物上传为 workflow artifact。
# - 仅在 push 版本标签时附加到 GitHub Release。

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 发布门禁：跑与 CI 一致的前端检查，红灯则不构建任何安装包。
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package / Cargo versions match
        run: npm run version:check

      - name: Format (Prettier)
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend (Vite)
        run: npm run build

  # 发布门禁：跑与 CI 一致的 Rust 检查（rustfmt / clippy / cargo test）。
  verify-rust:
    # ubuntu-24.04 (glibc 2.39) provides the __isoc23_* symbols the prebuilt ONNX Runtime (ort)
    # links against; 22.04 (glibc 2.35) fails to link them.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies (Tauri / WebKit / audio)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Format (rustfmt)
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  build-windows:
    needs: [verify, verify-rust]
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Smoke test file analysis with FFmpeg sidecars
        run: npm run smoke:file-analysis

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Tauri bundle (NSIS + release binary for portable)
        run: npm run desktop:release-nsis

      - name: Write updater descriptor (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $sig = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" | Select-Object -First 1
          if (!$sig) { throw "No .nsis.zip.sig found — updater signing did not run" }
          $zip = $sig.FullName -replace '\.sig$', ''
          $zipName = Split-Path $zip -Leaf
          $descriptor = @{
            platform  = "windows-x86_64"
            url       = "https://github.com/SounDoer/PLVS/releases/download/${{ github.ref_name }}/$zipName"
            signature = Get-Content $sig.FullName -Raw
          }
          $descriptor | ConvertTo-Json | Set-Content updater-windows.json
          Copy-Item $zip $zipName

      - name: Upload updater descriptor (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: updater-descriptor-windows
          path: updater-windows.json

      - name: Smoke test Windows installer
        run: npm run desktop:verify-windows-installer

      - name: Upload NSIS bundle as artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/

      - name: Upload portable executable as artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-portable-exe
          path: src-tauri/target/release/plvs.exe

      - name: Stage portable binary for Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $src = "src-tauri/target/release/plvs.exe"
          if (!(Test-Path $src)) { throw "Missing $src" }
          Copy-Item $src "PLVS-${{ github.ref_name }}-x64-portable.exe"

      - name: Prepare release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/changelog-release-body.mjs "${{ github.ref_name }}" release-notes.md

      - name: Attach installers to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            PLVS-${{ github.ref_name }}-x64-portable.exe
            *.nsis.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: [verify, verify-rust]
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Smoke test file analysis with FFmpeg sidecars
        run: npm run smoke:file-analysis

      - name: Build Tauri bundle (DMG)
        run: npm run desktop:release-dmg

      - name: Write updater descriptor (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sig=$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz.sig | head -1)
          if [ -z "$sig" ]; then echo "No .app.tar.gz.sig found — updater signing did not run" >&2; exit 1; fi
          tarball="${sig%.sig}"
          tarballName=$(basename "$tarball")
          signature=$(cat "$sig")
          node -e "
            const fs = require('fs');
            fs.writeFileSync('updater-macos.json', JSON.stringify({
              platform: 'darwin-aarch64',
              url: 'https://github.com/SounDoer/PLVS/releases/download/${{ github.ref_name }}/$tarballName',
              signature: process.argv[1],
            }));
          " "$signature"
          cp "$tarball" "$tarballName"

      - name: Upload updater descriptor (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: updater-descriptor-macos
          path: updater-macos.json

      - name: Smoke test macOS DMG
        run: npm run desktop:verify-macos-dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/

      - name: Rename DMG for Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          src=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          cp "$src" "PLVS-${{ github.ref_name }}-aarch64.dmg"

      - name: Attach DMG to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            PLVS-${{ github.ref_name }}-aarch64.dmg
            *.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-updater-manifest:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows descriptor
        uses: actions/download-artifact@v6
        with:
          name: updater-descriptor-windows

      - name: Download macOS descriptor
        uses: actions/download-artifact@v6
        with:
          name: updater-descriptor-macos

      - name: Prepare release notes from CHANGELOG
        run: node scripts/changelog-release-body.mjs "${{ github.ref_name }}" release-notes.md

      - name: Build latest.json
        run: |
          VERSION="${{ github.ref_name }}"
          node scripts/build-updater-manifest.mjs "${VERSION#v}" release-notes.md latest.json updater-windows.json updater-macos.json

      - name: Attach latest.json to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
