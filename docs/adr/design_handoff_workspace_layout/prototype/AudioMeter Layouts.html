<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AudioMeter — Layout Explorations</title>
<style>
  :root {
    /* Surfaces */
    --bg-0: #0c0c12;       /* outermost */
    --bg-1: #14141b;       /* app body */
    --bg-2: #1a1a22;       /* module body */
    --bg-3: #22222b;       /* module header */
    --bg-4: #2c2c36;       /* hover */
    --border: #2a2a33;
    --border-strong: #353541;
    --divider: #1f1f27;

    /* Text */
    --text: #e8e8ee;
    --text-dim: #9a9aa6;
    --text-dimmer: #61616d;
    --text-mute: #44444e;

    /* Audio palette */
    --accent: #4ec3ff;
    --accent-soft: rgba(78, 195, 255, 0.16);
    --accent-bg: #1a3a52;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --magenta: #d946ef;

    /* Spacing scale */
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
    --shadow-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
    --shadow-2: 0 8px 24px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
    --shadow-float: 0 12px 32px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);

    --hdr-h: 36px;
    --topbar-h: 48px;
    --statusbar-h: 28px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg-0);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    line-height: 1.4;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  button {
    font: inherit;
    color: inherit;
    background: transparent;
    border: 1px solid transparent;
    padding: 0;
    cursor: pointer;
  }
  button:focus { outline: none; }
  #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* ===== Top bar ===== */
  .topbar {
    height: var(--topbar-h);
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar .brand {
    font-weight: 600;
    letter-spacing: -0.01em;
    font-size: 14px;
    display: flex; align-items: center; gap: 8px;
    margin-right: 4px;
  }
  .topbar .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .topbar .seg {
    display: flex; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 2px;
  }
  .topbar .seg button {
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-dim);
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .topbar .seg button.active {
    background: var(--bg-4); color: var(--text);
  }
  .topbar .seg button:hover:not(.active) { color: var(--text); }

  .topbar .spacer { flex: 1; }

  .topbar .pill {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    color: var(--text-dim);
    font-size: 12px;
  }
  .topbar .pill:hover { color: var(--text); border-color: var(--border-strong); }
  .topbar .pill .label { color: var(--text-dimmer); font-size: 11px; }

  .topbar .icon-btn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--r-md);
    color: var(--text-dim);
  }
  .topbar .icon-btn:hover { background: var(--bg-2); color: var(--text); }
  .topbar .icon-btn.active { background: var(--accent-soft); color: var(--accent); }

  .topbar .stop-btn {
    background: var(--accent);
    color: #08252e;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: var(--r-md);
    font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .topbar .stop-btn:hover { filter: brightness(1.08); }

  /* ===== Workspace ===== */
  .workspace {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-1);
  }
  .workspace-inner {
    position: absolute; inset: 0;
    padding: 10px;
  }

  /* ===== Status bar ===== */
  .statusbar {
    height: var(--statusbar-h);
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 14px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
  }
  .statusbar .sep { width: 1px; height: 12px; background: var(--border); }
  .statusbar .status-ok {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--green);
    background: rgba(74, 222, 128, 0.1);
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  .statusbar .status-ok::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  }

  /* ===== Module Chrome ===== */
  .module {
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow-1);
    min-width: 0;
    min-height: 0;
  }
  .module:hover { border-color: var(--border-strong); }
  .module.focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-1); }
  .module.dragging { opacity: 0.85; box-shadow: var(--shadow-float); z-index: 1000; }
  .module.collapsed { }
  .module.collapsed .module-body { display: none; }

  .module-header {
    height: var(--hdr-h);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 6px 0 12px;
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
    cursor: default;
    user-select: none;
  }
  .module-header.draggable { cursor: grab; }
  .module-header.draggable:active { cursor: grabbing; }

  .module-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .module-title .title-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-mute);
  }
  .module.focus .module-title { color: var(--text); }
  .module.focus .module-title .title-dot { background: var(--accent); }

  .module-actions { display: flex; gap: 2px; }
  .module-actions button {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dimmer);
    border-radius: 4px;
  }
  .module-actions button:hover { background: var(--bg-4); color: var(--text); }
  .module-actions button.close:hover { color: var(--red); }

  .module-body {
    flex: 1;
    min-height: 0;
    min-width: 0;
    position: relative;
    overflow: hidden;
  }

  /* Resize handles */
  .resize-handle {
    position: absolute;
    background: transparent;
    z-index: 5;
  }
  .resize-handle.e { right: -3px; top: 8px; bottom: 8px; width: 6px; cursor: ew-resize; }
  .resize-handle.s { bottom: -3px; left: 8px; right: 8px; height: 6px; cursor: ns-resize; }
  .resize-handle.se { bottom: -3px; right: -3px; width: 14px; height: 14px; cursor: nwse-resize; }
  .resize-handle.se::after {
    content: '';
    position: absolute; right: 4px; bottom: 4px;
    width: 6px; height: 6px;
    border-right: 1.5px solid var(--text-mute);
    border-bottom: 1.5px solid var(--text-mute);
  }
  .module:hover .resize-handle.se::after { border-color: var(--text-dimmer); }

  /* Hidden modules tray */
  .hidden-tray {
    position: absolute;
    bottom: 16px; right: 16px;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    padding: 4px;
    display: flex;
    gap: 4px;
    box-shadow: var(--shadow-2);
    z-index: 50;
  }
  .hidden-tray .hidden-chip {
    padding: 5px 10px;
    background: var(--bg-2);
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hidden-tray .hidden-chip:hover { color: var(--text); border-color: var(--accent); border-style: solid; }
  .hidden-tray .hidden-chip::before { content: '+'; color: var(--accent); font-weight: 700; }

  /* Add-module popover */
  .popover {
    position: absolute;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    padding: 4px;
    min-width: 200px;
    box-shadow: var(--shadow-2);
    z-index: 100;
  }
  .popover .popover-section {
    padding: 6px 10px 4px;
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .popover .popover-item {
    width: 100%;
    text-align: left;
    padding: 7px 10px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .popover .popover-item:hover { background: var(--bg-4); }
  .popover .popover-item .check {
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent);
  }
  .popover .popover-item.disabled { color: var(--text-dimmer); }
  .popover hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* Fullscreen overlay */
  .fullscreen-overlay {
    position: fixed;
    inset: var(--topbar-h) 0 var(--statusbar-h) 0;
    background: var(--bg-0);
    z-index: 200;
    padding: 16px;
    display: flex;
  }

  /* Empty hint */
  .empty-hint {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-dimmer);
    font-size: 12px;
    pointer-events: none;
    gap: 8px;
  }
  .empty-hint code {
    background: var(--bg-3);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Layout switcher tooltip */
  .help-row {
    position: absolute;
    bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    font-size: 11px;
    color: var(--text-dimmer);
    background: rgba(20, 20, 27, 0.85);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    z-index: 40;
    pointer-events: none;
  }
  .help-row kbd {
    font: inherit;
    background: var(--bg-3);
    border: 1px solid var(--border);
    padding: 0 5px;
    border-radius: 3px;
    color: var(--text-dim);
  }

  /* Drop zones for dock */
  .drop-zone {
    position: absolute;
    background: var(--accent-soft);
    border: 1.5px dashed var(--accent);
    border-radius: var(--r-md);
    pointer-events: none;
    transition: opacity 0.12s;
    z-index: 999;
  }

  /* ===== Peak Meter ===== */
  .peak {
    width: 100%; height: 100%;
    display: grid;
    grid-template-columns: 26px 1fr;
    grid-template-rows: 1fr auto;
    gap: 6px;
    padding: 12px 12px 10px;
  }
  .peak-scale {
    display: flex; flex-direction: column; justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    text-align: right;
    padding: 14px 4px 22px 0;
  }
  .peak-bars {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    min-height: 0;
  }
  .peak-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; min-height: 0; }
  .peak-label {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-3);
    border-radius: 4px;
    padding: 3px 6px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .peak-label span { color: var(--text); font-weight: 600; margin-left: 4px; }
  .peak-bar-wrap {
    flex: 1; min-height: 0;
    background: rgba(0,0,0,0.35);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column-reverse;
  }
  .peak-bar {
    width: 100%;
    background: linear-gradient(to top,
      #4ade80 0%, #84cc16 35%, #facc15 60%, #fb923c 80%, #ef4444 100%);
    transition: height 0.05s linear;
    min-height: 1px;
  }
  .peak-footer {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 10px;
    color: var(--text-dimmer);
    letter-spacing: 0.05em;
    padding-top: 4px;
    border-top: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* ===== Loudness Chart ===== */
  .loudness {
    width: 100%; height: 100%;
    display: flex;
    padding: 8px 8px 0 0;
  }
  .loudness-yaxis {
    display: flex; flex-direction: column;
    justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    padding: 6px 6px 22px 8px;
    text-align: right;
    min-width: 28px;
    font-variant-numeric: tabular-nums;
  }
  .loudness-canvas {
    flex: 1;
    position: relative;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .loudness-canvas svg { display: block; }
  .loudness-refbadge {
    position: absolute;
    left: -22px;
    transform: translateY(-50%);
    top: calc(100% * (23 / 63));
    color: var(--orange);
    font-size: 10px;
    font-weight: 600;
    background: var(--bg-2);
    padding: 0 3px;
  }
  .loudness-xaxis {
    position: absolute; bottom: 4px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    padding: 0 6px;
    pointer-events: none;
  }
  .loudness-reftag {
    position: absolute; bottom: 22px; left: 8px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg-3);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* ===== Loudness Stats ===== */
  .lufs {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 8px;
    gap: 3px;
    overflow-y: auto;
  }
  .lufs-row {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg-3);
    border-radius: 6px;
    border: 1px solid transparent;
  }
  .lufs-row-active {
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  .lufs-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .lufs-row-active .lufs-label { color: var(--accent); }
  .lufs-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .lufs-unit {
    font-size: 9px;
    color: var(--text-dimmer);
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .lufs-compact .lufs-row { padding: 5px 8px; gap: 6px; }
  .lufs-compact .lufs-value { font-size: 16px; }
  .lufs-compact .lufs-label { font-size: 9px; }

  /* ===== Vectorscope ===== */
  .vectorscope {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 8px;
    position: relative;
  }
  .vs-svg {
    flex: 1;
    background: rgba(0,0,0,0.25);
    border-radius: 4px;
    min-height: 0;
  }
  .vs-labels {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
    pointer-events: none;
    color: var(--text-dimmer);
    font-size: 10px;
  }
  .vs-footer {
    text-align: center;
    font-size: 10px;
    color: var(--text-dimmer);
    letter-spacing: 0.05em;
    padding-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* ===== Spectrum ===== */
  .spectrum {
    width: 100%; height: 100%;
    display: flex;
    padding: 8px 8px 0 0;
  }
  .spectrum-yaxis {
    display: flex; flex-direction: column;
    justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    padding: 6px 6px 22px 8px;
    text-align: right;
    min-width: 24px;
    font-variant-numeric: tabular-nums;
  }
  .spectrum-canvas {
    flex: 1;
    position: relative;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .spectrum-xaxis {
    position: absolute; bottom: 4px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    padding: 0 4px;
    pointer-events: none;
  }

  /* ===== Spectrogram ===== */
  .spectrogram {
    width: 100%; height: 100%;
    display: flex;
    padding: 8px 8px 8px 0;
  }
  .spectrogram-yaxis {
    display: flex; flex-direction: column;
    justify-content: space-between;
    font-size: 10px; color: var(--text-dimmer);
    padding: 0 6px 0 8px;
    text-align: right;
    min-width: 30px;
    font-variant-numeric: tabular-nums;
  }
  .spectrogram-canvas {
    flex: 1;
    border-radius: 4px;
    overflow: hidden;
    background: #000;
    min-height: 0;
  }
  .spectrogram-canvas canvas {
    width: 100%; height: 100%;
    display: block;
    image-rendering: auto;
  }

  /* ===== Bento Grid Layout ===== */
  .bento {
    width: 100%; height: 100%;
    position: relative;
  }
  .bento-grid-hint {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(78, 195, 255, 0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(78, 195, 255, 0.04) 1px, transparent 1px);
    pointer-events: none;
    z-index: 0;
  }
  .bento-ghost {
    position: absolute;
    background: var(--accent-soft);
    border: 1.5px dashed var(--accent);
    border-radius: var(--r-lg);
    pointer-events: none;
    z-index: 1;
  }

  /* ===== Dock Layout (v2: slots with tabs) ===== */
  .dock {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    position: relative;
  }
  .dock-top {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .dock-bottom {
    flex-shrink: 0;
    min-height: 0;
    display: flex; flex-direction: column;
    padding-top: 6px;
  }
  .dock-bottom-empty { opacity: 0.55; }
  .dock-col {
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    padding: 0 3px;
  }
  .dock-col:first-child { padding-left: 0; }
  .dock-col:last-child { padding-right: 0; }
  .dock-col-flex { flex: 1; min-width: 0; }
  .dock-col-empty { opacity: 0.55; }

  .dock-region {
    flex: 1;
    min-height: 0;
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .dock-region-empty { opacity: 0.55; }

  /* Slot (tabbed panel) */
  .dock-slot {
    flex: 1 1 0;
    min-height: 0;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s;
  }
  .dock-slot.collapsed { flex: 0 0 auto; }
  .dock-slot.collapsed .slot-body { display: none; }
  .dock-slot:hover { border-color: var(--border-strong); }
  .dock-slot.focused {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .dock-slot.focused .slot-tab.active .tab-dot { background: var(--accent); }

  .slot-header {
    height: var(--hdr-h);
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .slot-tabs {
    flex: 1;
    display: flex;
    align-items: flex-end;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 0 0 4px;
    gap: 1px;
    min-width: 0;
    scrollbar-width: none;
  }
  .slot-tabs::-webkit-scrollbar { display: none; }

  .slot-tab {
    display: inline-flex; align-items: center; gap: 5px;
    height: calc(var(--hdr-h) - 4px);
    padding: 0 10px 0 9px;
    background: transparent;
    color: var(--text-dimmer);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 5px 5px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    cursor: grab;
    user-select: none;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
    max-width: 180px;
  }
  .slot-tab:hover { color: var(--text-dim); background: rgba(255,255,255,0.025); }
  .slot-tab.active {
    background: var(--bg-2);
    color: var(--text);
    border-color: var(--border);
    margin-bottom: -1px;
    padding-bottom: 1px;
  }
  .slot-tab.dragging { opacity: 0.35; }
  .slot-tab:active { cursor: grabbing; }
  .slot-tab .tab-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-mute);
    flex-shrink: 0;
  }
  .slot-tab.active .tab-dot { background: var(--text-dim); box-shadow: 0 0 4px var(--text-dim); }
  .slot-tab .tab-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .slot-tab .tab-close {
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px;
    color: var(--text-dimmer);
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
    margin-left: 2px;
    margin-right: -4px;
  }
  .slot-tab:hover .tab-close,
  .slot-tab.active .tab-close { opacity: 1; }
  .slot-tab .tab-close:hover {
    background: var(--bg-4);
    color: var(--red);
  }

  .slot-actions {
    display: flex; align-items: center;
    padding: 0 6px 0 4px;
    gap: 2px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    margin-left: 4px;
  }
  .slot-actions button {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dimmer);
    border-radius: 4px;
  }
  .slot-actions button:hover { background: var(--bg-4); color: var(--text); }
  .slot-actions button.close:hover { color: var(--red); }

  .slot-body {
    flex: 1;
    min-height: 0;
    min-width: 0;
    position: relative;
    overflow: hidden;
  }

  /* Drop zones (visible during drag) */
  .slot-zones {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    pointer-events: none;
    z-index: 10;
  }
  .slot-zones .zone {
    flex: 1;
    border: 1.5px dashed transparent;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, border-color 0.1s;
    margin: 4px;
    border-radius: var(--r-md);
  }
  .slot-zones .zone-above { margin-bottom: 2px; }
  .slot-zones .zone-below { margin-top: 2px; }
  .slot-zones .zone.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .slot-zones .zone-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--bg-2);
    padding: 4px 12px;
    border-radius: 99px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.12s;
    border: 1px solid var(--accent);
  }
  .slot-zones .zone.active .zone-label { opacity: 1; }

  .zone-tabs-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--hdr-h);
    background: var(--accent-soft);
    border: 1.5px dashed var(--accent);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    pointer-events: none;
    z-index: 12;
  }

  /* Region dividers */
  .dock-divider {
    background: transparent;
    position: relative;
    flex-shrink: 0;
    z-index: 2;
  }
  .dock-divider-v { width: 6px; cursor: ew-resize; }
  .dock-divider-h { height: 6px; cursor: ns-resize; }
  .dock-divider::before {
    content: '';
    position: absolute;
    background: var(--divider);
    transition: background 0.15s;
  }
  .dock-divider-v::before { top: 0; bottom: 0; left: 2px; right: 2px; }
  .dock-divider-h::before { left: 0; right: 0; top: 2px; bottom: 2px; }
  .dock-divider:hover::before { background: var(--accent); }

  .dock-empty {
    flex: 1;
    border: 1.5px dashed var(--border);
    border-radius: var(--r-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-mute);
    gap: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .dock-empty small {
    font-size: 10px;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--text-mute);
  }
  .dock-region-empty .dock-empty:hover { border-color: var(--accent); color: var(--accent); }

  .dock-drag-ghost {
    position: fixed;
    pointer-events: none;
    padding: 6px 12px;
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    box-shadow: var(--shadow-2);
    z-index: 9999;
  }

  /* ===== Activity Bar ===== */
  .app-row {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .activity-bar {
    width: 44px;
    flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
  }
  .activity-btn {
    width: 32px;
    height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    color: var(--text-mute);
    position: relative;
    transition: color 0.15s, background 0.15s;
  }
  .activity-btn:hover { color: var(--text); background: var(--bg-2); }
  .activity-btn.visible { color: var(--text-dim); }
  .activity-btn.focused {
    color: var(--accent);
    background: var(--accent-soft);
  }
  .activity-btn.focused::before {
    content: '';
    position: absolute;
    left: -2px;
    top: 6px; bottom: 6px;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .activity-btn .activity-tooltip {
    position: absolute;
    left: 100%;
    margin-left: 8px;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
    z-index: 100;
    box-shadow: var(--shadow-2);
  }
  .activity-btn:hover .activity-tooltip { opacity: 1; }
  .activity-btn .activity-tooltip small {
    color: var(--text-mute);
    margin-left: 6px;
    font-size: 10px;
  }
  .activity-divider {
    width: 24px;
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  /* ===== Free Float Layout ===== */
  .float {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }
  .float-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
  }
  .float-help {
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    font-size: 11px;
    color: var(--text-mute);
    pointer-events: none;
  }
  .float .module {
    box-shadow: var(--shadow-2);
  }

  /* ===== Module fullscreen variant ===== */
  .module-fullscreen {
    box-shadow: none;
    border-color: var(--border-strong);
  }

  /* Generic scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
</style>
